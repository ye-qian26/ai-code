<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00fff2"/>
      <stop offset="100%" style="stop-color:#ff00ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="url(#neonGrad)" stroke-width="3" filter="url(#glow)"/>
  <text x="50" y="58" text-anchor="middle" font-family="Orbitron" font-size="24" fill="url(#neonGrad)" filter="url(#glow)">AI</text>
</svg>