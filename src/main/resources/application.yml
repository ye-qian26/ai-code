spring:
  application:
    name: yu-ai-code-mother-backend
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  # redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: ${REDIS_DATABASE}
      password: ${REDIS_PASSWORD}
      ttl: 3600 # 缓存过期时间（秒）
  profiles:
    active: local
server:
  port: 8081
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.yuaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: ${DASHSCOPE_BASE_URL}
      api-key: ${DASHSCOPE_API_KEY}
      model-name: ${DASHSCOPE_MODEL}
#      strict-json-schema: true
#      response-format: json_object
      max-tokens: 8192
      log-requests: true
      log-responses: true
      max-retries: 3
      timeout: 300s
      connect-timeout: 60s
      read-timeout: 300s
    streaming-chat-model:
      base-url: ${DASHSCOPE_BASE_URL}
      api-key: ${DASHSCOPE_API_KEY}
      model-name: ${DASHSCOPE_MODEL}
      max-tokens: 8192
      log-requests: true
      log-responses: true
      timeout: 300s
      connect-timeout: 60s
      read-timeout: 300s
    # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: ${DASHSCOPE_BASE_URL}
      api-key: ${DASHSCOPE_API_KEY}
      model-name: ${DASHSCOPE_MODEL}
      max-tokens: 32768
      temperature: 0.1
      log-requests: true
      log-responses: true
      timeout: 600s
      connect-timeout: 60s
      read-timeout: 600s
    # 智能路由 AI 模型配置（用于简单的分类任务）
    routing-chat-model:
      base-url: ${DASHSCOPE_BASE_URL}
      api-key: ${DASHSCOPE_API_KEY}
      model-name: ${DASHSCOPE_MODEL}
      max-tokens: 100
      log-requests: true
      log-responses: true
      timeout: 60s
      connect-timeout: 30s
      read-timeout: 60s
# 添加 COS 对象存储配置（需要从腾讯云获取）
cos:
  client:
    #host: ${COS_HOST}
    secretId: ${COS_SECRET_ID}
    secretKey: ${COS_SECRET_KEY}
    region: ${COS_REGION}
    bucket: ${COS_BUCKET}
# Pexels 图片搜索配置
pexels:
  api-key: ${PEXELS_API_KEY}
# 阿里云 DashScope 配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY}
  image-model: wan2.2-t2i-flash
# 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always