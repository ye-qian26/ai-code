# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    include /etc/nginx/conf.d/*.conf;

    server {
        listen       80;
        listen       [::]:80;
        server_name  _;

        # Main frontend static files after npm run build.
        root         /www/ai-code/fronted/dist;
        index        index.html;

        include /etc/nginx/default.d/*.conf;

        # Backend container is exposed to the host on 38081.
        location /api/ {
            proxy_pass http://127.0.0.1:38081;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
        }

        # Generated app previews. Change this host path to the directory mounted
        # from the backend container's /app/tmp/code_deploy.
        location ~ ^/dist/([^/]+)/?$ {
            alias /www/ai-code/code_deploy/$1/index.html;
        }

        location /dist/ {
            alias /www/ai-code/code_deploy/;
            try_files $uri $uri/ =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 404 /404.html;
        location = /40x.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }

    server {
        listen       8080;
        server_name  _;

        location /blog/images/ {
            # Change this path only if your original image directory changes.
            alias /www/blog/images/;
            try_files $uri $uri/ =404;
        }
    }

