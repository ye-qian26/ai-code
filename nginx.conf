events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    keepalive_timeout 65;
    charset       utf-8;

    server {
        listen       80;
        server_name  localhost;

        root         E:/java/java_code/ai-code/tmp/code_deploy;
        index        index.html;

        # 根路径不承载主站页面，只提供部署作品访问
        location = / {
            return 404;
        }

        # 访问 /deployKey 时自动补全尾部斜杠，避免相对资源加载失败
        location ~ ^/([^/]+)$ {
            return 301 /$1/;
        }

        # 访问部署作品：
        # 1. 先尝试真实文件 /deployKey/...
        # 2. 文件不存在时回退到该作品目录下的 index.html，兼容 SPA
        location ~ ^/([^/]+)/(.*)$ {
            set $deploy_key $1;
            set $asset_path $2;
            try_files /$deploy_key/$asset_path /$deploy_key/index.html =404;
        }
    }
}
